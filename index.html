<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 앱</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/components.css" />

<body>
  <header class="page-header glass">

      <img class="brand-logo" src="assets/logo.svg" alt="" />

    <a href="basket/list.html" class="icon-btn cart-btn" aria-label="장바구니">
      <svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>

      <img class="hero-bg" src="assets/banner/hero.jpg" alt="" />
      <div class="hero-overlay"></div>
      <div class="hero-content container">
        <p class="hero-eyebrow">2026 Signature Blend</p>

        <a href="menus/list.html" class="hero-cta">메뉴 보러가기</a>

    <div class="container">
      <nav class="quick-nav">
        <a href="menus/list.html" class="quick-nav-item glass">
          <span class="quick-nav-icon"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8z"/><path d="M17 10h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M8 4c0 .8.8 1 .8 1.8S8 7 8 7"/><path d="M12 4c0 .8.8 1 .8 1.8S12 7 12 7"/></svg></span>
          <span class="quick-nav-label">메뉴</span>
        </a>
        <a href="my/index.html" class="quick-nav-item glass">
          <span class="quick-nav-icon"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></span>
          <span class="quick-nav-label">마이페이지</span>

        <a href="basket/list.html" class="quick-nav-item glass">
          <span class="quick-nav-icon"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg></span>
          <span class="quick-nav-label">장바구니</span>
        </a>
        <a href="orders/list.html" class="quick-nav-item glass">
          <span class="quick-nav-icon"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3z"/><path d="M9 8h6M9 12h6"/></svg></span>
          <span class="quick-nav-label">주문 내역</span>
        </a>
      </nav>

      <section class="featured-section">
        <h3 class="section-title">인기 메뉴</h3>
        <div class="featured-scroll" id="featuredScroll"></div>
      </section>
    </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="index.js"></script>

</html>
