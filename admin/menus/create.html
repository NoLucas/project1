<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 - 메뉴 등록</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="./create.css" />
  </head>
  <body>
    <div class="page-shell container">
      <header class="topbar glass">
        <div>
          <p class="eyebrow">Admin · Create Menu</p>
          <h1>새 메뉴 등록</h1>
        </div>
        <a class="secondary-link" href="./list.html">
          <svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          목록으로
        </a>
      </header>

      <main class="form-card">
        <form id="menuForm" class="menu-form">
          <div class="field-grid">
            <label class="field">
              <span>메뉴명</span>
              <input name="name" type="text" maxlength="30" required />
            </label>

            <label class="field">
              <span>카테고리</span>
              <select name="categoryId" id="categorySelect" required></select>
            </label>

            <label class="field">
              <span>가격</span>
              <input name="price" type="number" min="0" step="100" required />
            </label>

            <label class="field">
              <span>이미지 경로</span>
              <input name="image" type="text" placeholder="/images/menu.jpg" />
            </label>
          </div>

          <label class="field">
            <span>설명</span>
            <textarea name="description" rows="5" maxlength="200"></textarea>
          </label>

          <label class="checkbox-field">
            <input name="soldOut" type="checkbox" />
            <span>등록과 동시에 품절 상태로 표시</span>
          </label>

          <p id="message" class="message" aria-live="polite"></p>

          <div class="form-actions">
            <button class="secondary-button" type="button" id="cancelButton">취소</button>
            <button class="primary-button" type="submit">등록하기</button>
          </div>
        </form>
      </main>
    </div>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="./create.js"></script>
  </body>
</html>
