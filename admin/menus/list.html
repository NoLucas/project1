<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 - 메뉴 목록</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar glass">
        <div>
          <p class="eyebrow">Admin · Menu Management</p>
          <h1>메뉴 관리</h1>
        </div>
        <a class="primary-link" href="./create.html">
          <svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          새 메뉴 등록
        </a>
      </header>

      <main class="container page-content">
        <section class="summary-grid">
          <article class="summary-card glass">
            <span>전체 메뉴</span>
            <strong id="totalCount">0</strong>
          </article>
          <article class="summary-card glass">
            <span>판매 중</span>
            <strong id="activeCount">0</strong>
          </article>
          <article class="summary-card glass">
            <span>품절</span>
            <strong id="soldOutCount">0</strong>
          </article>
        </section>

        <section class="filter-panel glass">
          <label class="field">
            <span>카테고리</span>
            <select id="categoryFilter"></select>
          </label>

          <label class="field field-search">
            <span>검색</span>
            <input id="keywordInput" type="search" placeholder="메뉴명 또는 설명 검색" />
          </label>
        </section>

        <section class="list-panel">
          <div class="list-header">
            <h2>메뉴 목록</h2>
            <p id="resultText">총 0개</p>
          </div>
          <div id="menuList" class="menu-list"></div>
        </section>
      </main>
    </div>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
